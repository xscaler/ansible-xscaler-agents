name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  OTELCOL_VERSION: "0.154.0"

jobs:
  lint:
    name: Lint & syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: pip install ansible-core ansible-lint yamllint
      - name: Install collections
        run: ansible-galaxy collection install -r requirements.yml
      - name: yamllint
        run: yamllint .
      - name: ansible-lint
        run: ansible-lint
      - name: Syntax check
        run: |
          ansible-playbook --syntax-check playbooks/site.yml
          ansible-playbook --syntax-check playbooks/verify.yml

  validate-configs:
    name: Render bootstrap and validate fleet configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ansible-core
        run: pip install ansible-core
      - name: Render configs from the real role templates
        run: ansible-playbook test/render.yml
      - name: Confirm required receivers and supervisor release exist
        run: |
          docker run --rm otel/opentelemetry-collector-contrib:${OTELCOL_VERSION} components \
            | grep -E 'name: (snmp|netflow|hostmetrics|journald|windowseventlog|otlphttp)$'
          curl --proto '=https' --tlsv1.2 -fsSIL \
            "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/cmd%2Fopampsupervisor%2Fv${OTELCOL_VERSION}/opampsupervisor_${OTELCOL_VERSION}_linux_amd64" >/dev/null
      - name: Validate Linux fleet config
        run: |
          mkdir -p test/output/validated
          sed -E 's/\$\{secret:[A-Z0-9_.-]+\}/TEST_SECRET/g' examples/fleet-manager/linux-host.yaml > test/output/validated/linux-host.yaml
          docker run --rm -v "$PWD/test/output/validated":/cfg \
            otel/opentelemetry-collector-contrib:${OTELCOL_VERSION} validate --config /cfg/linux-host.yaml
      - name: Validate network collector fleet config
        run: |
          mkdir -p test/output/validated
          sed -E 's/\$\{secret:[A-Z0-9_.-]+\}/TEST_SECRET/g' examples/fleet-manager/network-collector.yaml > test/output/validated/network-collector.yaml
          docker run --rm -v "$PWD/test/output/validated":/cfg \
            otel/opentelemetry-collector-contrib:${OTELCOL_VERSION} validate --config /cfg/network-collector.yaml

  netflow-smoke:
    name: NetFlow parse smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send synthetic NetFlow and assert parsing
        run: bash test/netflow-smoke.sh

  e2e-linux:
    name: End-to-end Linux (systemd + role)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run otelcol_linux role in a systemd container
        run: bash test/e2e-linux.sh
