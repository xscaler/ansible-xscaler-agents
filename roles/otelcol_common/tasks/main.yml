---
# Validate the fleet-manager bootstrap inputs. The installer does not render
# telemetry pipelines; xScaler fleet manager delivers those over OpAMP.

- name: Assert required xScaler OpAMP variables are set
  ansible.builtin.assert:
    that:
      - xscaler_opamp_endpoint is defined
      - xscaler_opamp_endpoint | length > 0
      - xscaler_enrollment_token is defined
      - xscaler_enrollment_token | length > 0
      - xscaler_enrollment_token is match('^xse_')
    fail_msg: >-
      xscaler_opamp_endpoint and an xse_ xscaler_enrollment_token must be set.
      Put xscaler_enrollment_token in an ansible-vault file.
    quiet: true
