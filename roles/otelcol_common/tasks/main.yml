---
# Validate required inputs and derive the per-signal endpoint URLs that every
# agent role consumes. Sets facts only — no system changes.

- name: Assert required xScaler variables are set
  ansible.builtin.assert:
    that:
      - xscaler_endpoint is defined and xscaler_endpoint | length > 0
      - xscaler_org_id is defined and xscaler_org_id | length > 0
      - xscaler_api_key is defined and xscaler_api_key | length > 0
    fail_msg: >-
      xscaler_endpoint, xscaler_org_id and xscaler_api_key must all be set.
      Put xscaler_api_key in an ansible-vault file (see all.vault.yml.example).
    quiet: true

- name: Derive xScaler endpoint URLs from the endpoint id
  ansible.builtin.set_fact:
    xscaler_metrics_endpoint: "https://{{ xscaler_endpoint }}.m.{{ xscaler_base_domain }}/otlp/v1/metrics"
    xscaler_logs_endpoint: "https://{{ xscaler_endpoint }}.l.{{ xscaler_base_domain }}/otlp/v1/logs"
    xscaler_traces_endpoint: "https://{{ xscaler_endpoint }}.t.{{ xscaler_base_domain }}/otlp/v1/traces"
