---
# Install the collector binary on Windows. OpAMP supervisor owns runtime config
# and lifecycle.

- name: Set arch and release base facts
  ansible.builtin.set_fact:
    _otelcol_arch: "{{ 'amd64' if ansible_facts['architecture'] in ['64-bit', 'x86_64', 'amd64'] else 'arm64' }}"
    _otelcol_release_base: "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v{{ otelcol_version }}"

- name: Set download facts
  ansible.builtin.set_fact:
    _otelcol_zip_url: "{{ _otelcol_release_base }}/otelcol-contrib_{{ otelcol_version }}_windows_{{ _otelcol_arch }}.zip"
    _otelcol_exe: '{{ otelcol_windows_install_dir }}\otelcol-contrib.exe'

- name: Ensure install and config directories exist
  ansible.windows.win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ otelcol_windows_install_dir }}"

- name: Download otel agent release zip
  ansible.windows.win_get_url:
    url: "{{ _otelcol_zip_url }}"
    dest: 'C:\Windows\Temp\otelcol-contrib.zip'
  register: _dl

- name: Extract otel agent binary
  community.windows.win_unzip:
    src: 'C:\Windows\Temp\otelcol-contrib.zip'
    dest: "{{ otelcol_windows_install_dir }}"
    creates: "{{ _otelcol_exe }}"
  when: _dl is changed
  register: _otelcol_unzip

- name: Set Windows fleet labels
  ansible.builtin.set_fact:
    _xscaler_agent_labels_effective: "{{ {'agent_profile': 'windows_host'} | combine(xscaler_agent_labels | default({})) }}"

- name: Install and configure OpAMP supervisor
  ansible.builtin.include_role:
    name: opampsupervisor
  vars:
    opampsupervisor_agent_labels: "{{ _xscaler_agent_labels_effective }}"

- name: Restart supervisor after collector binary update
  ansible.windows.win_service:
    name: "{{ opampsupervisor_windows_service_name }}"
    state: restarted
  when: _otelcol_unzip is defined and _otelcol_unzip is changed
