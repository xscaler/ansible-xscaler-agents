---
otelcol_version: "0.147.0"
otelcol_nc_config_dir: /etc/otelcol-contrib
otelcol_nc_config_path: "{{ otelcol_nc_config_dir }}/config.yaml"
otelcol_nc_memory_limit_mib: 512

# Devices to poll (override in group_vars/collector_hosts.yml).
snmp_targets: []

# Flow listeners (override in group_vars/collector_hosts.yml).
flow_listeners:
  - { scheme: netflow, port: 2055 }
  - { scheme: sflow, port: 6343 }
  - { scheme: netflow, port: 4739 }

# Default SNMP metric/attribute spec applied to each device. This YAML block is
# injected verbatim under each snmp/<name> receiver. Override snmp_metrics with
# your own block (e.g. vendor-specific OIDs) per inventory.
# Uses 64-bit interface counters (ifHC*) keyed by interface index.
snmp_metrics_default: |
  resource_attributes:
    snmp.interface.index:
      oid: "1.3.6.1.2.1.2.2.1.1"
  attributes:
    interface.name:
      oid: "1.3.6.1.2.1.31.1.1.1.1"
  metrics:
    snmp.interface.in.octets:
      unit: By
      sum:
        aggregation: cumulative
        monotonic: true
        value_type: int
      column_oids:
        - oid: "1.3.6.1.2.1.31.1.1.1.6"
          resource_attributes: [snmp.interface.index]
    snmp.interface.out.octets:
      unit: By
      sum:
        aggregation: cumulative
        monotonic: true
        value_type: int
      column_oids:
        - oid: "1.3.6.1.2.1.31.1.1.1.10"
          resource_attributes: [snmp.interface.index]
    snmp.sysuptime:
      unit: cs
      gauge:
        value_type: int
      scalar_oids:
        - oid: "1.3.6.1.2.1.1.3.0"

snmp_metrics: "{{ snmp_metrics_default }}"
