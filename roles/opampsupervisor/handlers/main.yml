---
- name: Restart opampsupervisor linux
  listen: Restart opampsupervisor
  ansible.builtin.systemd:
    name: opampsupervisor
    state: restarted
    daemon_reload: true
  when: ansible_facts['os_family'] != "Windows"

- name: Restart opampsupervisor windows
  listen: Restart opampsupervisor
  ansible.windows.win_service:
    name: "{{ opampsupervisor_windows_service_name }}"
    state: restarted
  when: ansible_facts['os_family'] == "Windows"
