---
# xScaler fleet-manager bootstrap. The installer enrolls agents only; fleet
# manager delivers the collector telemetry config over OpAMP.
xscaler_opamp_endpoint: "wss://agents.xscalerlabs.com/v1/opamp"

# xscaler_enrollment_token is intentionally NOT here. Put it in the encrypted
# group_vars/all/vault.yml file; see group_vars/all/vault.yml.example.

# Labels are reported to fleet manager and used by config assignments.
xscaler_agent_labels:
  environment: prod
  region: us

otelcol_version: "0.154.0"
opampsupervisor_version: "{{ otelcol_version }}"
