---
# Sample inventory. Copy this directory to inventories/<env>/ and edit.
all:
  children:
    linux_hosts:
      hosts:
        web-01.example.com:
        db-01.example.com:
      # vars:
      #   ansible_user: ubuntu

    windows_hosts:
      hosts:
        win-app-01.example.com:
      vars:
        ansible_connection: winrm
        ansible_user: Administrator
        ansible_winrm_transport: ntlm
        ansible_port: 5986
        ansible_winrm_server_cert_validation: ignore   # set 'validate' in prod

    collector_hosts:
      # Dedicated host(s) that poll SNMP and receive NetFlow/sFlow/IPFIX exports.
      hosts:
        netcollector-01.example.com:
