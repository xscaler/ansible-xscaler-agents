---
# Render the supervisor bootstrap config from the real role template. Run from
# the repo root:
#   ansible-playbook test/render.yml
- name: Render OpAMP supervisor bootstrap configs for validation
  hosts: localhost
  connection: local
  become: false
  gather_facts: false
  vars:
    ansible_managed: "rendered by test/render.yml"
    xscaler_opamp_endpoint: "wss://agents.xscalerlabs.com/v1/opamp"
    xscaler_enrollment_token: "xse_test000000000000000000000000"
    xscaler_agent_name: "render-test"
    xscaler_agent_labels:
      environment: test
      region: local
    opampsupervisor_agent_labels:
      agent_profile: linux_host
      environment: test
      region: local
    opampsupervisor_collector_executable: /usr/bin/otelcol-contrib
    opampsupervisor_storage_dir: /var/lib/opampsupervisor
    opampsupervisor_agent_run_as: ""

  tasks:
    - name: Ensure output dir
      ansible.builtin.file:
        path: "{{ playbook_dir }}/output"
        state: directory
        mode: "0755"

    - name: Render Linux supervisor config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/opampsupervisor/templates/supervisor.yaml.j2"
        dest: "{{ playbook_dir }}/output/linux-supervisor.yaml"
        mode: "0644"

    - name: Render network collector supervisor config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/opampsupervisor/templates/supervisor.yaml.j2"
        dest: "{{ playbook_dir }}/output/network-supervisor.yaml"
        mode: "0644"
      vars:
        opampsupervisor_agent_labels:
          agent_profile: network_collector
          environment: test
          region: local

    - name: Render Windows supervisor config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/opampsupervisor/templates/supervisor.yaml.j2"
        dest: "{{ playbook_dir }}/output/windows-supervisor.yaml"
        mode: "0644"
      vars:
        opampsupervisor_agent_labels:
          agent_profile: windows_host
          environment: test
          region: local
        opampsupervisor_collector_executable: 'C:\Program Files\OpenTelemetry Collector\otelcol-contrib.exe'
        opampsupervisor_storage_dir: 'C:\ProgramData\opampsupervisor\storage'
