---
# Smoke-test: confirm the OpAMP supervisor is installed and owns the collector
# lifecycle. Fleet-manager registration/config status is verified in the portal.
- name: Verify xScaler OpAMP supervisor health
  hosts: all
  gather_facts: true
  tasks:
    - name: Check supervisor service (Linux)
      when: ansible_facts['os_family'] != "Windows"
      ansible.builtin.command: systemctl is-active opampsupervisor
      register: supervisor_linux
      changed_when: false

    - name: Check standalone collector service is disabled (Linux)
      when: ansible_facts['os_family'] != "Windows"
      ansible.builtin.command: systemctl is-enabled otelcol-contrib
      register: collector_linux
      changed_when: false
      failed_when: collector_linux.stdout != "disabled"

    - name: Report supervisor service (Linux)
      when: ansible_facts['os_family'] != "Windows"
      ansible.builtin.debug:
        msg: "opampsupervisor={{ supervisor_linux.stdout }}, otelcol-contrib={{ collector_linux.stdout }}"

    - name: Check supervisor service (Windows)
      when: ansible_facts['os_family'] == "Windows"
      ansible.windows.win_service_info:
        name: opampsupervisor
      register: supervisor_win

    - name: Report supervisor service (Windows)
      when: ansible_facts['os_family'] == "Windows"
      ansible.builtin.debug:
        msg: "opampsupervisor={{ (supervisor_win.services | first).state | default('unknown') }}"
